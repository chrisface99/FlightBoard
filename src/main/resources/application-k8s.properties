# Kubernetes Profile Configuration
spring.application.name=flight-board

# Server
server.port=8080
server.compression.enabled=true
server.compression.min-response-size=1024

# Actuator - Health probes for K8s liveness/readiness checks
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Logging - JSON format for better parsing in K8s logs
logging.level.root=INFO
logging.level.com.flightboard=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Cache configuration
spring.cache.type=simple
