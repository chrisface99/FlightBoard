spring.application.name=flight-board
server.port=8080

# OpenSky Network API OAuth2 Credentials
# Register at https://opensky-network.org to obtain a client ID and secret.
# Leave blank to run without authentication (anonymous rate limits apply:
# ~100 API credits per day vs 4000 for authenticated users).
opensky.client-id=
opensky.client-secret=
opensky.oauth-url=https://auth.opensky-network.org/auth/realms/opensky-network/protocol/openid-connect/token