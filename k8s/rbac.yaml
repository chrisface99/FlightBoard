apiVersion: v1
kind: ServiceAccount
metadata:
  name: flight-board
  labels:
    app: flight-board

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flight-board
  labels:
    app: flight-board
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flight-board
  labels:
    app: flight-board
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flight-board
subjects:
- kind: ServiceAccount
  name: flight-board
